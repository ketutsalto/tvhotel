<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Hotel</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background-size: cover;
    background-position: center;
}

/* CONTAINER TEXT */
#guestContainer {
    position: absolute;
    top: 45%;
    transform: translateY(-50%);
    display: flex;
    justify-content: center;
}

/* TEXT */
#guestName {
    font-size: clamp(30px, 4vw, 70px);
    font-weight: 700;
    color: #d4af37;
    text-align: center;
    line-height: 1.3;
    max-width: 80%;
    word-break: break-word;
}
</style>
</head>

<body>

<div id="guestContainer">
    <h2 id="guestName">Welcome</h2>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 CONFIG KAMU
const firebaseConfig = {
  apiKey: "AIzaSyCRTRfBJXa6dIvl__fchkFCaHZr5ZakTrA",
  authDomain: "tvhotel-e6555.firebaseapp.com",
  databaseURL: "https://tvhotel-e6555-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tvhotel-e6555",
  storageBucket: "tvhotel-e6555.firebasestorage.app",
  messagingSenderId: "1082612267063",
  appId: "1:1082612267063:web:1144e0a1e92e99bc0127b2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 PARAMETER
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";
const mode = params.get("mode") || "online";

// 🔥 THEMES (SESUAI DESIGN KAMU)
const themes = {
    default: "design.jpg",
    wedding: "wedding.jpg"
};

// 🔥 RENDER
function render(data) {
    const el = document.getElementById("guestName");
    const container = document.getElementById("guestContainer");

    const theme = data?.theme || "default";

    // BACKGROUND
    document.body.style.backgroundImage = `url('${themes[theme]}')`;

    // TEXT + POSISI (SUDAH AMAN DARI DESIGN KAMU)
    if (theme === "wedding") {
        el.innerText = "Happy Wedding\n" + (data?.name || "");

        container.style.left = "0%";
        container.style.width = "55%";
    } else {
        el.innerText = data?.name
            ? "Welcome\n" + data.name
            : "Our Valued Guest";

        container.style.left = "0";
        container.style.width = "55%";
    }
}

// 🔌 MODE
if (mode === "offline") {
    console.log("OFFLINE MODE");

    render({
        name: "Michael & Sarah",
        theme: "wedding"
    });

} else {
    console.log("ONLINE MODE");

    const guestRef = ref(db, "rooms/" + room);

    onValue(guestRef, (snapshot) => {
        render(snapshot.val());
    });
}
    // 🔄 AUTO REFRESH SETIAP 1 MENIT
setInterval(() => {
    location.reload();
}, 60000);
</script>

</body>
</html>
