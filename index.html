<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Hotel (Offline Mode)</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background-size: cover;
    background-position: center;
}

/* CONTAINER TEXT */
#guestContainer {
    position: absolute;
    top: 45%;
    transform: translateY(-50%);
    display: flex;
    justify-content: center;
}

/* TEXT */
#guestName {
    font-size: clamp(30px, 4vw, 70px);
    font-weight: 700;
    color: #d4af37;
    text-align: center;
    line-height: 1.3;
    max-width: 80%;
    word-break: break-word;
}
</style>
</head>

<body>

<div id="guestContainer">
    <h2 id="guestName">Welcome</h2>
</div>

<script>
// 🔥 Ambil parameter dari URL
const params = new URLSearchParams(window.location.search);
const themeParam = params.get("theme") || "default";

// 🔥 DATA DUMMY (bisa kamu ganti bebas)
const data = {
    name: "Michael & Sarah",
    theme: themeParam
};

// 🔥 MAPPING BACKGROUND
const themes = {
    default: "design.jpg",
    wedding: "wedding.jpg"
};

function render(data) {
    const el = document.getElementById("guestName");
    const container = document.getElementById("guestContainer");

    const theme = data.theme || "default";

    // 🎨 SET BACKGROUND
    document.body.style.backgroundImage = `url('${themes[theme]}')`;

    // 💬 SET TEXT + POSISI
    if (theme === "wedding") {
        el.innerText = "Happy Wedding\n" + data.name;

        // posisi kanan (biar tidak nabrak desain wedding)
        container.style.left = "0%";
        container.style.width = "55%";
    } else {
        el.innerText = "Welcome\n" + data.name;

        // posisi kiri (default design kamu)
        container.style.left = "0";
        container.style.width = "55%";
    }
}

// 🔥 RUN
render(data);
</script>

</body>
</html>
