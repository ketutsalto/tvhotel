<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reception Control</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #0f2a3f, #1f3d55);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
    font-size: 22px;
}

input, select {
    width: 100%;
    padding: 16px;
    margin-bottom: 15px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    outline: none;
}

button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
}

.save {
    background: linear-gradient(90deg, #f6d365, #fda085);
    color: black;
}

.clear {
    background: #555;
    color: white;
}

#status {
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
    opacity: 0;
    transition: 0.3s;
}
</style>
</head>

<body>

<div class="container">
    <h1>Reception Control</h1>

    <input id="room" type="number" placeholder="Room Number (ex: 101)">
    <input id="name" type="text" placeholder="Guest Name">

    <!-- 🔥 THEME -->
    <select id="theme">
        <option value="default">Default</option>
        <option value="wedding">Wedding</option>
    </select>

    <button class="save" onclick="save()">SAVE</button>
    <button class="clear" onclick="clearRoom()">CLEAR ROOM</button>

    <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 CONFIG SAMA
const firebaseConfig = {
  apiKey: "AIzaSyCRTRfBJXa6dIvl__fchkFCaHZr5ZakTrA",
  authDomain: "tvhotel-e6555.firebaseapp.com",
  databaseURL: "https://tvhotel-e6555-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tvhotel-e6555",
  storageBucket: "tvhotel-e6555.firebasestorage.app",
  messagingSenderId: "1082612267063",
  appId: "1:1082612267063:web:1144e0a1e92e99bc0127b2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function showStatus(text, color){
    const s = document.getElementById("status");
    s.innerText = text;
    s.style.color = color;
    s.style.opacity = 1;

    setTimeout(() => s.style.opacity = 0, 1200);
}

window.save = function() {
    const room = document.getElementById("room").value.trim();
    const name = document.getElementById("name").value.trim();
    const theme = document.getElementById("theme").value;

    if (!room || !name) {
        showStatus("Lengkapi data!", "orange");
        return;
    }

    set(ref(db, "rooms/" + room), {
        name: name,
        theme: theme
    });

    showStatus("Saved ✔", "lightgreen");
};

window.clearRoom = function() {
    const room = document.getElementById("room").value.trim();

    if (!room) {
        showStatus("Masukkan nomor kamar!", "orange");
        return;
    }

    set(ref(db, "rooms/" + room), {
        name: "",
        theme: "default"
    });

    showStatus("Room Cleared ✔", "#ff7675");
};
</script>

</body>
</html>
